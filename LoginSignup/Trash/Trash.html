<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Trash.css">
    <title>Trash</title>
</head>
<body>
    <div id="menu">
        <div id="menuopener">
            <div id="menu-icon">
                <div id="line"></div>
                <div id="line"></div>
                <div id="line"></div>
            </div>
        </div>
        <div id="menu-page">
            <a id="note" draggable="false">
                <i data-lucide="notebook-pen" id="note_icon"></i>Notes
            </a>
            <a id="painting" draggable="false">
                <i data-lucide="palette" id="paint_icon"></i>Painting
            </a>
            <a id="trash" draggable="false">
                <i data-lucide="trash-2" id="trash_icon"></i>Trash
            </a>
            <a id="log-out_btn" draggable="false">
                <i data-lucide="log-out" id="log-out"></i>Log out
            </a>
        </div>
    </div>
    <h1 id="greetings">Trash</h1> <!--*Will greet using the username of the user-->
    <p id="delete-message">Notes will be forever deleted after 30 days</p>
    <div id="containers"></div>
    <div id="decide">
        <button id="restore" onclick="permanentlydelete()">Restore</button>
        <button id="delete" onclick="restore()">Delete</button>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Trash.js"></script>
    <script src="../common.js"></script>
</body>
</html>
