<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Edit_notes.css">
    <title>New note</title>
</head>
<body>
    <div id="menu">
        <a id="back" href="../Notes/Notes.html" draggable="false">
            <i data-lucide="chevron-left"></i>
        </a>
        <input type="text" name="Title" id="title" placeholder="Title"> <!-- For the Trash page this will be disabled-->
        <a id="sub-menu_icon" draggable="false">
            <i data-lucide="ellipsis-vertical" id="ellipsis-icon"></i>
        </a>
        <div id="container">
            <a id="save" draggable="false" onclick="update(noteId)">
                <i data-lucide="save" id="save-icon"></i>
                Save
            </a>
            <a id="download" draggable="false"> <!-- TODO: Will work on it in the future-->
                <i data-lucide="download" id="download-icon"></i>
                Export
            </a>
            <a id="important" draggable="false" onclick="fill()">
                <!-- <img src="../Icons/star.png" alt=""> -->
                <i data-lucide="star" id="important-icon"></i>
                Important
            </a>
            <a id="trash" draggable="false" onclick="deleteNote()">
                <i data-lucide="trash-2" id="trash-icon"></i>Delete
            </a>
        </div>
    </div>
    <textarea id="note_input" placeholder="Write your thoughts here..."></textarea> <!-- For the Trash page this will be disabled-->



    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Edit_notes.js"></script>
    <script src="../common.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
