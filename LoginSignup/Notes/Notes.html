<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Notes.css">
    <title>Notes</title>
</head>
<body>
    <div id="menu">
        <div id="menuopener">
            <div id="menu-icon">
                <div id="line"></div>
                <div id="line"></div>
                <div id="line"></div>
            </div>
        </div>
        <div id="menu-page">
            <a id="note" draggable="false">
                <i data-lucide="notebook-pen" id="note_icon"></i>Notes
            </a>
            <a href="../Painting/Painting.html" id="painting" draggable="false">
                <i data-lucide="palette" id="paint_icon"></i>Painting
            </a>
            <a href="../Trash/Trash.html" id="trash" draggable="false">
                <i data-lucide="trash-2" id="trash_icon"></i>Trash
            </a>
            <a id="log-out_btn" draggable="false">
                <i data-lucide="log-out" id="log-out"></i>Log out
            </a>
        </div>
    </div>
    <h1 id="greetings">Notes</h1> <!--*Will greet using the username of the user-->
    <input type="text" id="search" placeholder="Search notes">
    <a id="new_note" href="../Create_note/Create_note.html" draggable="false">
        <i data-lucide="circle-plus"></i>
    </a>
    <div id="containers"></div>
    <div id="decide">
        <button id="move" onclick="move()">
            <i data-lucide="folder-input"></i>Move
        </button>
        <button id="lock">
            <i data-lucide="lock-keyhole"></i>Lock
        </button>
        <button id="share">
            <i data-lucide="share-2" id="share-icon"></i>Share
        </button>
        <button id="delete">
            <i data-lucide="trash-2"></i>Delete
        </button>
        <button id="more" onclick="more()">
            <i data-lucide="ellipsis-vertical"></i>More
        </button>
        <div id="more_options">
            <button id="mark_important">Mark as Important</button>
            <button id="tag_color">Tag / Color</button>
            <button id="duplicate">Duplicate</button>
            <button id="clear">Clear Content</button>
            <button id="export">Export</button>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Notes.js"></script>
    <script src="../common.js"></script>
</body>
</html>
