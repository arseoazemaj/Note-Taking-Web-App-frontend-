<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Notes.css">
    <title>Notes</title>
</head>
<body>
    <div id="menu">
        <div id="menuopener">
            <div id="menu-icon">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>
        <div id="menu-page">
            <a id="note" draggable="false">
                <i data-lucide="notebook-pen" id="note_icon"></i>Notes
            </a>
            <a href="../Painting/Painting.html" id="painting" draggable="false">
                <i data-lucide="palette" id="paint_icon"></i>Painting
            </a>
            <a href="../Trash/Trash.html" id="trash" draggable="false">
                <i data-lucide="trash-2" id="trash_icon"></i>Trash
            </a>
            <a id="log-out_btn" draggable="false">
                <i data-lucide="log-out" id="log-out"></i>Log out
            </a>
        </div>
    </div>
    <h1 id="greetings">Notes</h1> <!--*Will greet using the username of the user-->
    <input type="text" id="search" placeholder="Search notes">
    <a id="new_note" href="../Create_note/Create_note.html" draggable="false">
        <i data-lucide="circle-plus"></i>
    </a>
    <div id="containers">
        <div id="folders_menu"></div>
    </div>

    <div id="decide">
        <div id="blur-background"></div>
        <div id="move_container">
            <button id="move" ontouchend="move()">
                <i data-lucide="folder-input"></i>Move
            </button>
            <div id="move_menu">
                <h3 id="folder-text">Select a folder</h3>
                <div id="folders">
                    <button id="create_folder-btn" ontouchend="create_folder()">Create a new file
                        <i data-lucide="plus" id="plus"></i>
                    </button>
                </div>
                    <div id="create_folder">
                        <h3 id="folder_text">Create a new folder</h3>
                        <input type="text" placeholder="Folder name" id="folder_namer">
                        <p id="color_text">Color</p>
                        <div id="dotted_line"></div>
                        <div id="color_picker">
                            <div class="colors" id="color_1">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_2">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_3">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_4">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_5">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_6">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_7">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_8">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_9">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_10">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_11">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                            <div class="colors" id="color_12">
                                <i data-lucide="check" class="check_color"></i>
                            </div>
                        </div>
                        <div id="chose">
                            <button id="cancel" role="button" ontouchend="cancel()">Cancel</button>
                            <button id="add" role="button" ontouchend="add()">Add</button>
                        </div>
                    </div>
            </div>
        </div>
        <button id="lock">
            <i data-lucide="lock-keyhole"></i>Lock
        </button>
        <button id="share">
            <i data-lucide="share-2" id="share-icon"></i>Share
        </button>
        <button id="delete">
            <i data-lucide="trash-2"></i>Delete
        </button>
        <div id="more_container">
            <button id="more" ontouchend="more()">
                <i data-lucide="ellipsis-vertical"></i>More
            </button>
            <div id="more_options">
                <button id="mark_important">Mark as Important</button>
                <button id="tag_color">Tag / Color</button>
                <button id="duplicate">Duplicate</button>
                <button id="clear">Clear Content</button>
                <button id="export">Export</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Notes.js"></script>
    <script src="../common.js"></script>
</body>
</html>
