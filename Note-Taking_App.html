<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Note-Taking_App.css">
        <title>Note-Taking-Web-App</title>
    </head>
    <body>
        <div id="container">
            <form id="log_ig">
                <h2 id="text">Log in</h2>
                <input type="text" id="login_username" placeholder="Username" required>
                <div id="password-container-3">
                    <input type="password" id="login_password" placeholder="Password" required>
                    <span id="toggle-icon-3" onclick="togglePassword('login_password', 'eye-icon-3', 'hidden-eye-icon-3')">
                        <img src="/Icons/eye.png" alt="Eye Icon" id="eye-icon-3">
                        <img src="/Icons/hidden-eye.png" alt="Hidden Eye Icon" id="hidden-eye-icon-3" style="display: none;">
                    </span>
                </div>
                <button id="log_ig_btn">Log in</button>
                <p id="forgot">Forgot password?</p>
            </form>
            
            <form id="sign_up">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email" required>
                <div id="password-container-1">
                    <input type="password" id="Password" placeholder="Password" required>
                    <span id="toggle-icon-1" onclick="togglePassword('Password', 'eye-icon-1', 'hidden-eye-icon-1')">
                        <img src="/Icons/eye.png" alt="Eye Icon" id="eye-icon-1">
                        <img src="/Icons/hidden-eye.png" alt="Hidden Eye Icon" id="hidden-eye-icon-1" style="display: none;">
                    </span>
                </div>
                <div id="password-container-2">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <span id="toggle-icon-2" onclick="togglePassword('confirmPassword', 'eye-icon-2', 'hidden-eye-icon-2')">
                        <img src="/Icons/eye.png" alt="Eye Icon" id="eye-icon-2">
                        <img src="/Icons/hidden-eye.png" alt="Hidden Eye Icon" id="hidden-eye-icon-2" style="display: none;">
                    </span>
                </div>
                <button id="sign_up_btn">Sign up</button>
                <button id="have_acc" onclick="go_to_log_in()">Already have an account?</button>
            </form>
        </div>

        <script src="Note-Taking_App.js"></script>
    </body>
</html>
