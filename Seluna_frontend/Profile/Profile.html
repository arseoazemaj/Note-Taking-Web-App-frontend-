<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Profile.css">
    <title>Profile</title>
</head>
<body>
    <a href="../Notes/Notes.html">
        <i id="back" data-lucide="chevron-left"></i>
    </a>

    <div id="icon">
        <i id="user_icon" data-lucide="user-round"></i>
    </div>
    <h3 id="username">Username
        <i id="pen" data-lucide="pen" data-tap="change_name"></i>
    </h3>
    <div id="blur_background" ontouchstart="blur_backgroundHandler()"></div>
    <div id="username_edit">
        <h3>You can change your username here every 30 days.</h3>
        <input type="text" id="username_input" placeholder="Change your username here.">
        <div id="decide_edit">
            <button id="cancel_edit" data-tap="cancel_change">Cancel</button>
            <button id="continue_edit">Confirm</button>
        </div>
    </div>




    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Profile.js"></script>
    <script src="../common.js"></script>
</body>
</html>
