<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Profile.css">
    <title>Profile</title>
</head>
<body>
    <a href="../Notes/Notes.html">
        <i id="back" data-lucide="chevron-left"></i>
    </a>

    <div id="user">
        <div id="icon">
            <i id="user_icon" data-lucide="user-round"></i>
        </div>
        <h3 id="username">Username</h3>
    </div>
    <div id="settings">
        <div id="setting_menu">
            <button class="menues" id="account" data-tap="account">Account</button>
            <button class="menues" id="note" data-tap="note">Notes</button>
            <button class="menues" id="backup" data-tap="backup">Backup& Export</button>
            <button class="menues" id="security" data-tap="security">Security</button>
            <button class="menues" id="help" data-tap="help">Help</button>
        </div>

        <div id="setting_page">
            <div id="account_settings">
                <button id="username_change" data-tap="change_name">Change Username</button>
                <button id="password_change" data-tap="change_password">Change Password</button>
            </div>
            <div id="note_settings">
                <button>Note</button>
            </div>
            <div id="backup_settings">
                <button>Backup & Export</button>
            </div>
            <div id="security_settings">
                <button>Security</button>
            </div>
            <div id="help_settings">
                <button>Help</button>
            </div>
        </div>
    </div>



    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Profile.js"></script>
    <script src="../common.js"></script>
</body>
</html>
