    <div id="settings">
        <div id="setting_menu">
            <button class="menues" id="account" data-tap="account">
                <i data-lucide="circle-user-round"></i>
            </button>
            <button class="menues" id="security" data-tap="security">
                <i id="security_icon" data-lucide="shield-check"></i>
            </button>
            <button class="menues" id="editor" data-tap="editor">
                <i id="editor_icon" data-lucide="notebook-pen"></i>
            </button>
            <button class="menues" id="appearance" data-tap="appearance">
                <i id="appearance_icon" data-lucide="pencil-line"></i>
            </button>
            <button class="menues" id="focus" data-tap="focus">
                <i id="focus_icon" data-lucide="bell"></i>
            </button>
            <button class="menues" id="help" data-tap="help">
                <i id="help_icon" data-lucide="help-circle"></i>
            </button>
        </div>

        <div id="setting_page">
            <div id="account_settings">
                <button>Account</button>
            </div>
            <div id="note_settings">
                <button id="auto_save_btn" data-tap="auto_save">Auto Save
                    <div id="auto_save_btn_toggle" class="off">
                        <div id="auto_save_btn_circle" class="off"></div>
                    </div>
                </button>

                <button id="default_view_btn">Default View
                    <div id="default_view_toggle" class="off">
                        <div id="list_view" data-tap="list_view">List</div>
                        <div id="grid_view" class="off" data-tap="grid_view">Grid</div>
                    </div>
                </button>

                <button id="sort_by_btn" data-tap="sort_by">Sort By
                    <div id="sort_info">
                        <div id="sort_txt">Created At</div>
                        <div id="sort_arrow">></div>
                    </div>
                    <div id="sort_menu"></div>
                </button>
            </div>
            <div id="backup_settings">
                <button>Backup & Export</button>
            </div>
            <div id="security_settings">
                <button>Security</button>
            </div>

            <div id="editor_settings">
                <button>Editor</button>
            </div>

            <div id="appearance_settings">
                <button>Appearance</button>
            </div>

            <div id="focus_settings">
                <button>Focus</button>
            </div>

            <div id="help_settings">
                <button>Help</button>
            </div>
        </div>
    </div>
