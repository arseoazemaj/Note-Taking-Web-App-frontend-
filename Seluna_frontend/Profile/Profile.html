<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Profile.css">
    <title>Profile</title>
</head>
<body>
    <a href="../Notes/Notes.html">
        <i id="back" data-lucide="chevron-left"></i>
    </a>

    <div id="user">
        <img src="../Icons/User_Icons/User_Icon_1.png" id="icon" data-tap="profile_icon"></img>
        <div id="change_icon">
            <img src="../Icons/User_Icons/User_Icon_1.png" id="icon_on_page" data-tap="profile_icon"></img>
            <div id="change_icon_menu">
                <img src="../Icons/User_Icons/User_Icon_1.png" class="images" id="image_1">
                <img src="../Icons/User_Icons/User_Icon_2.png" class="images" id="image_2">
                <img src="../Icons/User_Icons/User_Icon_3.png" class="images" id="image_3">
                <img src="../Icons/User_Icons/User_Icon_4.png" class="images" id="image_4">
                <img src="../Icons/User_Icons/User_Icon_5.png" class="images" id="image_5">
                <img src="../Icons/User_Icons/User_Icon_6.png" class="images" id="image_6">
                <img src="../Icons/User_Icons/User_Icon_7.png" class="images" id="image_7">
                <img src="../Icons/User_Icons/User_Icon_8.png" class="images" id="image_8">
                <img src="../Icons/User_Icons/User_Icon_9.png" class="images" id="image_9">
                <img src="../Icons/User_Icons/User_Icon_10.png" class="images" id="image_10">
                <img src="../Icons/User_Icons/User_Icon_11.png" class="images" id="image_11">
                <img src="../Icons/User_Icons/User_Icon_12.png" class="images" id="image_12">
                <img src="../Icons/User_Icons/User_Icon_13.png" class="images" id="image_13">
                <img src="../Icons/User_Icons/User_Icon_14.png" class="images" id="image_14">
                <img src="../Icons/User_Icons/User_Icon_15.png" class="images" id="image_15">
                <img src="../Icons/User_Icons/User_Icon_16.png" class="images" id="image_16">
                <img src="../Icons/User_Icons/User_Icon_17.png" class="images" id="image_17">
                <img src="../Icons/User_Icons/User_Icon_18.png" class="images" id="image_18">
                <img src="../Icons/User_Icons/User_Icon_19.png" class="images" id="image_19">
                <img src="../Icons/User_Icons/User_Icon_20.png" class="images" id="image_20">
            </div>
        </div>
        <h3 id="username"></h3>
    </div>
    <div id="settings">
        <div id="setting_menu">
            <button class="menues" id="account" data-tap="account">Account</button>
            <button class="menues" id="note" data-tap="note">Notes</button>
            <button class="menues" id="backup" data-tap="backup">Backup& Export</button>
            <button class="menues" id="security" data-tap="security">Security</button>
            <button class="menues" id="help" data-tap="help">Help</button>
        </div>

        <!-- <div id="blur_background" ontouchstart="blur_backgroundHandler()"></div> -->
        <div id="setting_page">
            <div id="account_settings">
                <div id="username_input">
                    <input id="username_change" placeholder="Username">
                    <i data-lucide="pen" id="change_username_btn" data-tap="change_name"></i>
                </div>
                <div id="email_input">
                    <input id="email_change" type="email" placeholder="Email">
                    <i data-lucide="pen" id="change_email_btn" data-tap="change_email"></i>
                </div>
                <div id="password_menu">
                    <button id="change_password_btn" data-tap="change_password">Change Password</button>
                    <div id="blur_background" ontouchstart="blur_backgroundHandler()"></div>
                    <div id="password_change_menu">
                        <h3>Put your old password to confirm your identity.</h3>
                        <div class="password-wrapper">
                            <input id="old_password" type="password" placeholder="Current Password">
                                <span id="toggle-icon-2" data-tap="togglePassword">
                                    <img src="../Icons/eye.png" alt="Eye Icon" class="eye_icon" id="eye_2">
                                    <img src="../Icons/hidden-eye.png" alt="Hidden Eye Icon" class="hidden_eye_icon" id="hidden_eye_2" style="display: none;">
                                </span>
                        </div>
                        <div id="decide">
                            <button id="cancel_password" data-tap="cancel_password">Cancel</button>
                            <button id="continue_password" data-tap="continue_password">Continue</button>
                        </div>
                    </div>
                    <div id="change_password">
                        <h3>Enter your new strong password.</h3>
                        <div class="password-wrapper">
                            <input id="new_password" type="password" placeholder="New Password">
                            <span id="toggle-icon-2" data-tap="togglePassword">
                                <img src="../Icons/eye.png" alt="Eye Icon" class="eye_icon" id="eye_2">
                                <img src="../Icons/hidden-eye.png" alt="Hidden Eye Icon" class="hidden_eye_icon" id="hidden_eye_2" style="display: none;">
                            </span>
                        </div>
                        <div class="password-wrapper">
                            <input id="confirm_new_password" type="password" placeholder="Confirm New Password">
                            <span id="toggle-icon-3" data-tap="togglePassword">
                                <img src="../Icons/eye.png" alt="Eye Icon" class="eye_icon" id="eye_3">
                                <img src="../Icons/hidden-eye.png" alt="Hidden Eye Icon" class="hidden_eye_icon" id="hidden_eye_3" style="display: none;">
                            </span>
                        </div>
                        <div id="decide_password">
                            <button id="cancel_password_change" data-tap="cancel_password_change">Cancel</button>
                            <button id="save_password" data-tap="save_password">Save</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="note_settings">
                <button>Note</button>
            </div>
            <div id="backup_settings">
                <button>Backup & Export</button>
            </div>
            <div id="security_settings">
                <button>Security</button>
            </div>
            <div id="help_settings">
                <button>Help</button>
            </div>
        </div>
    </div>



    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="Profile.js"></script>
    <script src="../common.js"></script>
</body>
</html>
