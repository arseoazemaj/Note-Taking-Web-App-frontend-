<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Log_in-and-Sign_up.css">
        <title>Authenticate</title>
    </head>
    <body>
        <div id="container">
            <form id="sign_up">
                <h1 id="sign_up-text">Sign up</h1>
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email" required>
                <div id="password-container-1">
                    <input type="password" id="Password" placeholder="Password (+8 characteres)" required>
                    <span id="toggle-icon-1" onclick="togglePassword_sign_up()">
                        <img src="../Icons/eye.png" alt="Eye Icon" id="eye-icon-1">
                        <img src="../Icons/hidden-eye.png" alt="Hidden Eye Icon" id="hidden-eye-icon-1" class="hidden-eye-icon" style="display: none;">
                    </span>

                </div>
                <div id="password-container-2">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <span id="toggle-icon-2" onclick="togglePassword_sign_up()">
                        <img src="../Icons/eye.png" alt="Eye Icon" id="eye-icon-2">
                        <img src="../Icons/hidden-eye.png" alt="Hidden Eye Icon" id="hidden-eye-icon-2" class="hidden-eye-icon" style="display: none;">
                    </span>
                </div>
                <button id="sign_up_btn" onclick="signup(event)" disabled>Sign up</button>
            </form>


            <form id="log_in">
                <h1 id="log_in-text">Log in</h1>
                <input type="text" id="login_username" placeholder="Username" required>
                <div id="password-container-3">
                    <input type="password" id="login_password" placeholder="Password (+8 characteres)" required>
                    <span id="toggle-icon-3" onclick="togglePassword_log_in()">
                        <img src="../Icons/eye.png" alt="Eye Icon" id="eye-icon-3">
                        <img src="../Icons/hidden-eye.png" alt="Hidden Eye Icon" id="hidden-eye-icon-3" class="hidden-eye-icon" style="display: none;">
                    </span>
                </div>
                <button id="log_in_btn" onclick="login(event)" disabled>Log in</button>
                <a href="forgot" id="forgot">Forgot pssassword?</a> <!--* Will send a email to reset the password-->
            </form>

            <div id="redirect_sign_up">
                <button id="have_acc1" onclick="go_to_log_in()">Log in</button> <!--* Will redirect to the login page-->
                <button id="create_acc1" >Sign up</button>
            </div>
            <div id="redirect_log_in">
                <button id="have_acc2" >Log in</button>
                <button id="create_acc2" onclick="go_to_sign_up()">Sign up</button> <!--* Will redirect to the sign up page-->
            </div>
        </div>



        <script src="Log_in-and-Sign_up.js"></script>
    </body>
</html>
