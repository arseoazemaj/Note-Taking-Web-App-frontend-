<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Create_note.css">
    <title>New note</title>
</head>
<body>
    <div id="menu">
        <a id="back" href="../Notes/Notes.html" draggable="false">
            <i data-lucide="chevron-left"></i>
        </a>
        <input type="text" name="Title" id="title" placeholder="Title">
        <div id="blur_background" ontouchend="closeMenu()"></div>
        <a id="sub-menu_icon" draggable="false" ontouchend="openMenu()">
            <i data-lucide="ellipsis-vertical" id="ellipsis-icon"></i>
            <div id="container">
                <button id="save" draggable="false" ontouchend="save()">
                    <i data-lucide="save" id="save-icon"></i>
                    Save
                </button>
                <button id="important" draggable="false" ontouchend="fill()">
                    <i data-lucide="star" id="important-icon"></i>
                    Important
                </button>
                <div id="lock_container">
                    <button id="lock" ontouchend="lock()">
                        <i data-lucide="lock-keyhole" id="lock-icon"></i>Lock
                    </button>
                    <div id="lock_bg" ontouchend="closelockMenuBG()"></div>
                    <div id="lock_menu">
                        <h3>Are you sure you want to lock this note?</h3>
                        <p>Once locked, it will stay hidden and protected. Only your password can bring it back to view.</p>
                        <h3>Do you want to continue?</h3>
                        <div class="lock_decide">
                            <button class="lock_menu_answere" id="not_lock" ontouchend="closelockMenu()">No</button>
                            <button class="lock_menu_answere" id="do_lock" ontouchend="continueLock()">Yes</button>
                        </div>
                        <div id="lock_password_menu">
                            <h3 id="lock_password_menu_text">Create a strong password and keep it safe this note will only open for you.</h3>
                            <input type="text" id="lock_password" placeholder="Enter a password"> <!--Change to type="password"-->
                            <input type="text" id="confirm_lock_password" placeholder="Confirm your password"> <!--Change to type="password"-->
                            <div class="lock_decide">
                                <button id="cancel_lock" ontouchend="cancelLockPassword()">Cancel</button>
                                <button id="continue_lock" ontouchend="confirmLock()" disabled>Lock</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button id="download" draggable="false">
                    <i data-lucide="download" id="download-icon"></i> <!--TODO: Will work in it later-->
                    Download
                </button>
                <button id="trash" draggable="false" ontouchend="deleteNote()">
                    <i data-lucide="trash-2" id="trash-icon"></i>Delete
                </button>
            </div>
        </a>
    </div>
    <textarea id="note_input" placeholder="Write your thoughts here..."></textarea>



    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../common.js"></script>
    <script src="Create_note.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
